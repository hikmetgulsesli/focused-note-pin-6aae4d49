<!DOCTYPE html>

<html class="light" lang="en"><head>

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar from JSON (CRITICAL: Active Navigation logic not applied as this is a transactional page, but navigation is provided as per JSON for context if needed, though strictly it should be suppressed. Following JSON structure as base, but suppressing nav cluster to prioritize content canvas as per Semantic Shell Mandate: Linear/Transactional/Task-Focused). We keep the brand and actions. -->
<header class="bg-surface-container-lowest border-b border-outline-variant docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center w-full px-margin-page py-stack-compact max-w-container-max mx-auto">
<div class="flex items-center gap-4">
<a class="text-headline-md font-headline-md font-bold text-primary flex items-center gap-2" href="#">
<span class="material-symbols-outlined" data-icon="push_pin" style="font-variation-settings: 'FILL' 1;">push_pin</span>
                    Focused Note Pin
                </a>
<span class="bg-secondary-fixed/20 text-secondary-fixed-dim px-2 py-0.5 rounded text-label-sm font-label-sm ml-4 border border-secondary-fixed/30 flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span> Draft - Unsaved changes
                </span>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<img alt="User profile" class="w-8 h-8 rounded-full object-cover border border-outline-variant" data-alt="A small circular user profile portrait. A professional headshot of a person with a neutral background, highly detailed, well-lit, conveying a modern corporate aesthetic suitable for a high-end productivity tool." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD9G55nh0MSJHxAzN64u2djrefP1ZVX00s0itzm-PTtzX6QyApH7uzh1VbK6f3StC-rR2SKYKvsxeGDjWXhiU3rR7o8JqHAVFSooIpI22MM_1o3Bq__QldRifj3hE_17LHU0TOGQcNjAlqJ7aOTkUk2OTd2THHLBYv4jlZcOPn5bCeknnrX0PYK91TenyLl8vnBpiFccnMqv8idcu7UvX1BsKADqNeaUSgTqY4pg6p28wfuXoZACPq7inv4mbevv9yUVm8_STjkiV8"/>
</div>
</div>
</header>
<!-- Main Content Area: Focused Editor Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto px-gutter py-8 flex flex-col gap-6">
<!-- Editor Header & Meta -->
<div class="flex flex-col gap-2">
<input class="w-full bg-transparent border-0 border-b border-transparent hover:border-outline-variant focus:border-secondary focus:ring-0 text-headline-lg font-headline-lg text-on-surface placeholder:text-outline-variant px-0 py-2 transition-colors" placeholder="Record Title" type="text" value="Q3 Architecture Review"/>
<!-- Validation Example -->
<!-- <p class="text-error text-label-sm font-label-sm mt-1 flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">error</span> Title is required</p> -->
</div>
<div class="flex gap-4 border-b border-surface-variant pb-4">
<div class="flex items-center gap-2 w-1/3">
<span class="material-symbols-outlined text-outline-variant text-[18px]">folder</span>
<select class="w-full bg-transparent border-0 text-body-sm font-body-sm text-on-surface focus:ring-0 px-0 cursor-pointer">
<option>Engineering</option>
<option>Product</option>
<option>Design</option>
</select>
</div>
<div class="flex items-center gap-2 w-2/3">
<span class="material-symbols-outlined text-outline-variant text-[18px]">sell</span>
<div class="flex gap-2 flex-wrap flex-1 items-center">
<span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-sm text-label-sm font-label-sm flex items-center gap-1">
                        Architecture <button class="hover:text-primary"><span class="material-symbols-outlined text-[12px]">close</span></button>
</span>
<span class="bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-sm text-label-sm font-label-sm flex items-center gap-1">
                        Review <button class="hover:text-primary"><span class="material-symbols-outlined text-[12px]">close</span></button>
</span>
<input class="bg-transparent border-0 text-body-sm font-body-sm w-24 p-0 focus:ring-0 placeholder:text-outline-variant" placeholder="Add tag..." type="text"/>
</div>
</div>
</div>
<!-- Rich Text Toolbar (Simplified visual representation) -->
<div class="flex items-center gap-1 p-2 bg-surface border border-outline-variant rounded-lg">
<button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant transition-colors" title="Bold"><span class="material-symbols-outlined text-[18px]">format_bold</span></button>
<button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant transition-colors" title="Italic"><span class="material-symbols-outlined text-[18px]">format_italic</span></button>
<div class="w-[1px] h-4 bg-outline-variant mx-1"></div>
<button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant transition-colors" title="Bullet List"><span class="material-symbols-outlined text-[18px]">format_list_bulleted</span></button>
<button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant transition-colors" title="Numbered List"><span class="material-symbols-outlined text-[18px]">format_list_numbered</span></button>
<div class="w-[1px] h-4 bg-outline-variant mx-1"></div>
<button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant transition-colors" title="Code Block"><span class="material-symbols-outlined text-[18px]">code</span></button>
<button class="p-1 rounded hover:bg-surface-container-high text-on-surface-variant transition-colors" title="Attach File"><span class="material-symbols-outlined text-[18px]">attach_file</span></button>
</div>
<!-- Editor Content Area -->
<div class="flex-1 relative">
<textarea class="w-full h-full min-h-[400px] resize-none border-0 bg-transparent focus:ring-0 text-body-md font-body-md text-on-surface placeholder:text-outline-variant p-0 leading-relaxed" placeholder="Start typing..."></textarea>
<!-- Focus state indicator line -->
<div class="absolute left-[-16px] top-0 bottom-0 w-[2px] bg-secondary opacity-0 transition-opacity duration-200 pointer-events-none" id="editor-focus-indicator"></div>
</div>
</main>
<!-- Action Bar (Docked Bottom) -->
<footer class="bg-surface border-t border-outline-variant p-stack-default sticky bottom-0 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<div class="max-w-3xl mx-auto flex justify-end gap-3 items-center w-full">
<span class="text-label-sm font-label-sm text-outline-variant mr-auto">Last saved: Just now</span>
<button class="px-4 py-2 border border-outline-variant text-on-surface font-label-md text-label-md rounded hover:bg-surface-container-high focus:outline-none focus:ring-2 focus:ring-secondary/50 transition-all bg-surface-container-lowest" data-action="ACT_CANCEL_EDIT">
                Cancel
            </button>
<button class="px-6 py-2 bg-primary text-on-primary font-label-md text-label-md rounded hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all flex items-center gap-2" data-action="ACT_SAVE_RECORD">
<span class="material-symbols-outlined text-[16px]">save</span> Save Record
            </button>
</div>
</footer>
<script>
        // Simple interaction for the editor textarea to show focus state on the side
        const textarea = document.querySelector('textarea');
        const indicator = document.getElementById('editor-focus-indicator');

        textarea.addEventListener('focus', () => {
            indicator.classList.remove('opacity-0');
            indicator.classList.add('opacity-100');
        });

        textarea.addEventListener('blur', () => {
            indicator.classList.remove('opacity-100');
            indicator.classList.add('opacity-0');
        });
    </script>
</body></html>
